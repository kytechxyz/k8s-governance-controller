apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: governance-webhook
webhooks:
  - name: governance-webhook.default.svc
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kyverno
            - kube-system
            - cert-manager
            - monitoring
            - kubevirt
            - kubecost
    clientConfig:
      service:
        name: governance-webhook
        namespace: default
        path: /validate
        port: 443
      caBundle: 
    rules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
